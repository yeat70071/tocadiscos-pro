<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tocadiscos Pro</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #1a1a1a; color: white; font-family: sans-serif; padding: 30px; }
        
        .header-collection { display: flex; gap: 20px; justify-content: center; margin-bottom: 40px; }
        .album-card { width: 140px; cursor: pointer; border: 4px solid transparent; border-radius: 10px; overflow: hidden; transition: transform 0.2s; }
        .album-card:hover { transform: scale(1.05); }
        .album-card img { width: 100%; display: block; }
        .album-card.active { border-color: #f39c12; }

        .main-container { display: flex; gap: 50px; justify-content: center; align-items: flex-start; }

        /* Bigger Playlist/Song Selection */
        .playlist { width: 450px; height: 550px; overflow-y: auto; background: #111; padding: 25px; border-radius: 12px; font-size: 18px; box-shadow: 0 8px 16px rgba(0,0,0,0.5); }
        .track { padding: 14px; cursor: pointer; border-bottom: 1px solid #222; transition: background 0.2s; }
        .track:hover { background: #333; }
        .track.playing { color: #f39c12; font-weight: bold; background: #222; border-radius: 6px; }

        /* Bigger Turntable Base */
        .turntable-base { width: 550px; height: 550px; background: #333; border-radius: 14px; position: relative; border: 12px solid #444; box-shadow: 0 12px 24px rgba(0,0,0,0.6); overflow: hidden; }
        
        /* Bigger Platter */
        .platter { width: 480px; height: 480px; background: #111; border-radius: 50%; position: absolute; top: 23px; left: 23px; display: flex; justify-content: center; align-items: center; }
        
        /* Bigger Vinyl with Drop/Load Animation */
        .vinyl { width: 450px; height: 450px; border-radius: 50%; background-size: cover; background-position: center; transition: transform 0.3s; }
        
        /* Drop Animation trigger class */
        .vinyl.loading { animation: loadDisc 0.6s ease-out forwards; }
        
        /* Combined Spinning and Constant Scale after drop */
        .vinyl.spinning { animation: spin 2.5s linear infinite; }
        
        @keyframes loadDisc {
            0% { transform: scale(1.3); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        /* Bigger Tonearm with Smooth Delay Animation */
        .tonearm { width: 14px; height: 260px; background: #ccc; position: absolute; top: 15px; right: 60px; transform-origin: 50% 15px; transform: rotate(-35deg); transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); z-index: 10; }
        .tonearm.playing { transform: rotate(15deg); }
        .tonearm::after { content: ''; position: absolute; bottom: 0; width: 26px; height: 45px; background: #000; left: -6px; border-radius: 2px; }

        /* Bigger Controls */
        .controls { margin-top: 30px; display: flex; gap: 15px; justify-content: center; }
        button { padding: 16px 30px; cursor: pointer; background: #f39c12; border: none; color: white; font-weight: bold; border-radius: 8px; font-size: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: background 0.2s; }
        button:hover { background: #e67e22; }
    </style>
</head>
<body>

<div class="header-collection" id="albumGrid"></div>

<div class="main-container">

        <div class="turntable-base">
            <div class="tonearm" id="tonearm"></div>
            <div class="platter">
                <div class="vinyl" id="vinyl"></div>
            </div>
        </div>
        <div class="controls">
            <button onclick="prevTrack()">PREV</button>
            <button onclick="togglePlay()">PLAY / PAUSE</button>

    </div>
</div>

    const audio = document.getElementById('audio'), vinyl = document.getElementById('vinyl'), tonearm = document.getElementById('tonearm');
    let currentAlbumIdx = 0, currentSongIdx = 0;
    let animationTimeout = null;

    function init() {
        const grid = document.getElementById('albumGrid');
        library.forEach((alb, i) => {
            const card = document.createElement('div');
            card.className = 'album-card';
            const displayImg = alb.coverImg ? alb.coverImg : alb.vinylImg;
            card.innerHTML = `<img src="${displayImg}">`;
            card.onclick = () => { currentAlbumIdx = i; loadAlbum(); };
            grid.appendChild(card);
        });
        loadAlbum();
    }

    function loadAlbum() {
        // Reset State and stop active audio instantly during switch
        audio.pause();
        clearTimeout(animationTimeout);
        vinyl.classList.remove('spinning', 'loading');
        tonearm.classList.remove('playing');
        
        // Force Reflow to re-trigger CSS animations perfectly
        void vinyl.offsetWidth; 

        // Update Design Images & Selection Highlights
        vinyl.style.backgroundImage = `url('${library[currentAlbumIdx].vinylImg}')`;
        const pl = document.getElementById('playlist'); pl.innerHTML = '';
        
        library[currentAlbumIdx].songs.forEach((s, i) => {
            const row = document.createElement('div'); row.className = 'track'; row.id = 't-' + i;
            row.innerText = (i+1) + '. ' + s.title;
            row.onclick = () => { currentSongIdx = i; triggerSequence(); };
            pl.appendChild(row);
        });
        
        const cards = document.querySelectorAll('.album-card');
        cards.forEach((card, i) => {
            if (i === currentAlbumIdx) { card.classList.add('active'); } 
            else { card.classList.remove('active'); }
        });

        currentSongIdx = 0;
        triggerSequence();
    }

    // Sequence: Load Disc animation -> Move Tonearm -> Play Sound and Spin Disc
    function triggerSequence() {
        audio.pause();
        clearTimeout(animationTimeout);
        
        // Step 1: Remove running states and run Disc drop animation
        vinyl.classList.remove('spinning', 'running');
        tonearm.classList.remove('playing');
        vinyl.classList.add('loading');
        
        document.querySelectorAll('.track').forEach(t => t.classList.remove('playing'));
        const trackEl = document.getElementById('t-' + currentSongIdx);
        if (trackEl) trackEl.classList.add('playing');

        // Step 2: Once the disc drops (600ms), swing the needle onto the track
        animationTimeout = setTimeout(() => {
            tonearm.classList.add('playing');
            
            // Step 3: Once the needle hits the disc track (800ms travel time), fire audio & start spin
            animationTimeout = setTimeout(() => {
                audio.src = library[currentAlbumIdx].songs[currentSongIdx].url;
                audio.play().catch(e => console.log("Playback interrupted or requires user gesture configuration"));
                vinyl.classList.add('spinning');
            }, 800);
            
        }, 600);
    }

    function togglePlay() {
        if(audio.paused) { 
            audio.play(); 
            vinyl.classList.add('spinning'); 
            tonearm.classList.add('playing'); 
        } else { 
            audio.pause(); 
            vinyl.classList.remove('spinning'); 
            tonearm.classList.remove('playing'); 
        }
    }

    function nextTrack() { 
        if(currentSongIdx < library[currentAlbumIdx].songs.length - 1) { 
            currentSongIdx++; 
            triggerSequence(); 
        } 
    }
    
    function prevTrack() { 
        if(currentSongIdx > 0) { 
            currentSongIdx--; 
            triggerSequence(); 
        } 
    }

    audio.onended = nextTrack;
    init();
</script>
